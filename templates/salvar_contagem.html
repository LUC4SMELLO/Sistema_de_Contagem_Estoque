<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salvar Contagem</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/salvar_contagem.css') }}">

</head>
<body>

    <header>
        <h1>Distribuidora Cambuí</h1>
        <img src="{{ url_for('static', filename='images/logo_dbcambui_2.png') }}" alt="Logo da Empresa">
    </header>

    <hr>

    {% if mensagem %}
        <h2 class="texto-adicional-mensagem">
            {{ mensagem | safe }}
        </h2>
    {% endif %}

    {% if erro %}
        <p class="texto-adicional-erro">
            {{ erro | safe }}
        </p>
        <h2 class="texto-adicional-mensagem">Contate um Administrador.</h2>
    {% endif %}
        

</body>
</html>
